name: Deploy to Hostinger

# Builds the site and uploads dist/ to Hostinger over FTP on every push to main.
# Requires three repo secrets (Settings → Secrets and variables → Actions):
#   FTP_SERVER    e.g. ftp.tudominio.com  (hPanel → Files → FTP Accounts → host)
#   FTP_USERNAME  the FTP account username
#   FTP_PASSWORD  the FTP account password
# And one repo variable (optional):
#   FTP_DIR       server target dir, default: public_html/  (use a subfolder for staging)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy dist/ to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ vars.FTP_DIR || 'public_html/' }}
          dangerous-clean-slate: false
